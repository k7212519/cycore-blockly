<div class="act-btn ccenter">
    @switch(state){
    @case('default'){
    <div class="ccenter default">
        <div class="qq ccenter" [ngClass]="{'no-border': noBorder}" [ngStyle]="{'color': color,'border-color': color}">
            <i class="{{icon}}"></i>
        </div>
    </div>
    }
    @case('doing'){
    <div class="lloading ccenter">
        <div class="icon ccenter" [ngStyle]="{'color': color}">
            @if (icon && !icon.includes('fa-play')) {
                <i class="{{icon}}"></i>
            }
        </div>
        <div class="qq qq2 ccenter" [ngStyle]="{'color': color}">
            <i class="fa-regular fa-spinner-third"></i>
        </div>
    </div>
    }
    @case('done'){
    <div class="ccenter">
        @if (toWink) {
        <i class="fa-regular fa-face-smile-wink" [ngStyle]="{'color': color}"></i>
        }@else{
        <i class="fa-regular fa-face-smile" [ngStyle]="{'color': color}"></i>
        }
    </div>
    }
    @case('error'){
    <div class="ccenter">
        <div class="qq ccenter" [ngClass]="{'no-border': noBorder}" [ngStyle]="{'border-color': 'red'}">
            <i class="fa-light fa-xmark"></i>
        </div>
    </div>
    }
    @case('warn'){
    <div class="ccenter">
        <div class="qq ccenter" [ngClass]="{'no-border': noBorder}" [ngStyle]="{'border-color': '#f0b506'}">
            <i class="fa-regular fa-exclamation"></i>
        </div>
    </div>
    }
    }
</div>
