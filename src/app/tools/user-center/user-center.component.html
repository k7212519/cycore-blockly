<app-tool-container [title]="'个人中心'" (closeEvent)="close()">
  <section class="profile">
    <div class="identity">
      <div class="avatar" aria-hidden="true">
        <i class="fa-light fa-user"></i>
      </div>
      <div>
        <div class="eyebrow">当前登录账号</div>
        <h2>{{ currentUser?.realName || currentUser?.username || '用户' }}</h2>
        @if (currentUser?.realName && currentUser?.username) {
          <p>&#64;{{ currentUser?.username }}</p>
        }
      </div>
    </div>

    <dl class="details">
      <div>
        <dt>用户 ID</dt>
        <dd>{{ currentUser?.userId || '-' }}</dd>
      </div>
      <div>
        <dt>账号类型</dt>
        <dd>{{ currentUser?.userType || '普通用户' }}</dd>
      </div>
      <div>
        <dt>登录状态</dt>
        <dd class="online"><span></span>已登录</dd>
      </div>
    </dl>

    <button
      nz-button
      nzType="default"
      nzDanger
      [nzLoading]="loggingOut"
      (click)="logout()"
    >
      <i class="fa-light fa-arrow-right-from-bracket"></i>
      退出登录
    </button>
  </section>
</app-tool-container>
