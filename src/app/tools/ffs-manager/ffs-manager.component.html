@if (currentUrl == "/ffs-manager") {
<app-sub-window [title]="'FFS_MANAGER.TITLE' | translate" [winBtns]="['go-main', 'minimize', 'maximize', 'close']">
  <ng-container *ngTemplateOutlet="windowBoxTemplate"></ng-container>
</app-sub-window>
} @else {
<app-tool-container [title]="'FFS_MANAGER.TITLE' | translate" [path]="'/ffs-manager'" (closeEvent)="close()">
  <ng-container *ngTemplateOutlet="windowBoxTemplate"></ng-container>
</app-tool-container>
}

<ng-template #windowBoxTemplate>
  <div class="window-box">
    <div class="main-box">
      <div class="settings">
        <div class="line">
          <div class="item port-item">
            <div class="title">{{ 'FFS_MANAGER.PORT' | translate }}</div>
            <div class="item-inner ccenter" (click)="openPortList($event)">
              <div class="value">{{ currentPort || ('FFS_MANAGER.UNSELECTED' | translate) }}</div>
              <div class="arrow-box">
                <i class="fa-light fa-angle-right arrow" [ngClass]="{'down': showPortList}"></i>
              </div>
            </div>
          </div>
          <div class="switch">
            <nz-switch [(ngModel)]="switchValue" [nzLoading]="busy && !switchValue" [nzDisabled]="!currentPort"
              (ngModelChange)="switchConnection()"></nz-switch>
          </div>
        </div>
      </div>

      <div class="content">
        <app-device-info [deviceInfo]="deviceInfo" [partitions]="partitions"
          [filesystemPartitions]="filesystemPartitions" (selectPartition)="selectPartition($event)">
        </app-device-info>

        <app-partition-map [partitions]="partitions"></app-partition-map>

        <app-filesystem-manager [selectedPartition]="selectedPartition" [filesystemSession]="filesystemSession"
          [files]="filesystemFiles" [usage]="filesystemUsage" [dirty]="filesystemDirty"
          [statusText]="filesystemStatusText" [busy]="busy" [currentPort]="currentPort"
          (loadContent)="loadFilesystemContent()" (uploadFile)="uploadFileToFilesystem($event)"
          (createDirectory)="createFilesystemDirectory($event)" (saveContent)="saveFilesystemContent()"
          (formatFilesystem)="formatFilesystemContent()" (downloadPartition)="downloadSelectedPartition()"
          (restorePartition)="restoreSelectedPartition($event)" (erasePartition)="eraseSelectedPartition()"
          (downloadFile)="downloadFilesystemFile($event)" (renameEntry)="renameFilesystemEntry($event)"
          (deleteEntry)="deleteFilesystemEntry($event)" (viewEntry)="viewFilesystemFile($event)">
        </app-filesystem-manager>
      </div>
    </div>
  </div>
</ng-template>

@if (showPortList) {
<app-menu [position]="position" [width]="260" [menuList]="portList" (closeEvent)="closePortList()"
  (itemClickEvent)="selectPort($event)"></app-menu>
}
