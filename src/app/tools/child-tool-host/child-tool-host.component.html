@if (isStandalone) {
<app-sub-window [title]="titleKey | translate" [winBtns]="['go-main', 'minimize', 'maximize', 'close']">
  <ng-container header-title-prefix>
    <ng-container *ngTemplateOutlet="hostStatusTpl"></ng-container>
  </ng-container>
  <ng-container header-btns>
    <ng-container *ngTemplateOutlet="headerTpl"></ng-container>
  </ng-container>
  <ng-container *ngTemplateOutlet="contentTpl"></ng-container>
</app-sub-window>
} @else {
<app-tool-container [title]="titleKey | translate" [path]="routePath" (closeEvent)="close()">
  <ng-container header-title-prefix>
    <ng-container *ngTemplateOutlet="hostStatusTpl"></ng-container>
  </ng-container>
  <ng-container header-btns>
    <ng-container *ngTemplateOutlet="headerTpl"></ng-container>
  </ng-container>
  <ng-container *ngTemplateOutlet="contentTpl"></ng-container>
</app-tool-container>
}

<ng-template #hostStatusTooltip>
  <div class="host-status-tooltip">
    @if (serverInfo?.port) {
    <div class="mono">127.0.0.1:{{ serverInfo?.port }}</div>
    }
    @if (serverInfo?.pid) {
    <div class="mono">PID {{ serverInfo?.pid }}</div>
    }
  </div>
</ng-template>

<ng-template #hostStatusTpl>
  <span class="child-host-status ccenter" nz-tooltip nzTooltipPlacement="bottom"
    [nzTooltipTitle]="(serverInfo?.port || serverInfo?.pid) ? hostStatusTooltip : null"
    [attr.aria-label]="hostStatus" role="status">
    <span class="host-status-dot" [class.ready]="hostStatus === 'ready'"
      [class.starting]="hostStatus === 'starting'" [class.error]="hostStatus === 'error'"
      [class.closed]="hostStatus === 'closed'" [class.idle]="hostStatus === 'idle'"></span>
  </span>
</ng-template>

<ng-template #headerTpl>
  <div class="child-host-header-actions">
    <button class="child-host-header-btn ccenter" type="button" [disabled]="hostStatus === 'starting'"
      (click)="restart()" nz-tooltip nzTooltipPlacement="bottom" nzTooltipTitle="Restart" aria-label="Restart">
      <i class="fa-light fa-rotate-right"></i>
    </button>
  </div>
</ng-template>

<ng-template #contentTpl>
  <div class="child-tool-host">
    <div class="iframe-shell">
      @if (iframeSrc) {
      <iframe [src]="iframeSrc" (load)="onFrameLoad($event)"></iframe>
      }

      @if (isLoading) {
      <div class="host-overlay loading" role="status" aria-live="polite" aria-busy="true">
        <div class="host-loading-spinner" aria-hidden="true"></div>
        <div class="host-loading-text">{{ titleKey | translate }}加载中</div>
      </div>
      }

      @if (hostStatus === 'error') {
      <div class="host-overlay error">
        <strong>{{ backendFailedText }}</strong>
        <span>{{ errorMessage }}</span>
      </div>
      }
    </div>
  </div>
</ng-template>
